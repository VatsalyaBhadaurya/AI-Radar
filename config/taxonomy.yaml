# Taxonomy for AI Engineering Radar
# Each category has keywords used to compute "relevance" against item title + summary.
# "engineering_keywords" boost engineering_value when present.
# "noise_keywords" push items toward the low-signal/noise category and reduce score.

categories:
  model_releases:
    label: "Model Releases"
    keywords:
      - "release"
      - "launch"
      - "model"
      - "GPT"
      - "Claude"
      - "Gemini"
      - "Llama"
      - "Mistral"
      - "open weights"
      - "checkpoint"
      - "fine-tune"
      - "foundation model"

  infra_tooling:
    label: "Infra & Inference Tooling"
    keywords:
      - "inference"
      - "serving"
      - "quantization"
      - "vLLM"
      - "TensorRT"
      - "CUDA"
      - "GPU"
      - "throughput"
      - "latency"
      - "kernel"
      - "compiler"
      - "runtime"
      - "deployment"
      - "framework"
      - "library"
      - "SDK"
      - "API"
      - "edge inference"
      - "on-device"
      - "Jetson"
      - "ONNX"
      - "real-time"
      - "embedded"

  robotics_vla:
    label: "Robotics & Embodied AI"
    keywords:
      - "robot"
      - "robotics"
      - "embodied"
      - "manipulation"
      - "locomotion"
      - "humanoid"
      - "VLA"
      - "vision-language-action"
      - "policy"
      - "actuator"
      - "sim-to-real"
      - "teleoperation"
      - "ROS2"
      - "ROS 2"
      - "behavior tree"
      - "behaviour tree"
      - "affordance"
      - "world model"
      - "SLAM"
      - "sensor fusion"
      - "navigation"
      - "grasping"

  vlm_multimodal:
    label: "VLM / VLA / Multimodal"
    keywords:
      - "vision-language"
      - "multimodal"
      - "VLM"
      - "image-to-text"
      - "video understanding"
      - "captioning"
      - "visual reasoning"
      - "diffusion"
      - "image generation"
      - "video generation"
      - "speech"
      - "audio model"
      - "speech-to-text"
      - "Whisper"
      - "depth estimation"
      - "scene segmentation"
      - "scene understanding"
      - "3D reconstruction"
      - "object detection"
      - "LLaVA"

  papers_benchmarks:
    label: "Papers & Benchmarks"
    keywords:
      - "paper"
      - "arXiv"
      - "benchmark"
      - "evaluation"
      - "dataset"
      - "SOTA"
      - "state-of-the-art"
      - "ablation"
      - "training"
      - "reasoning"
      - "RLHF"
      - "alignment"

  repos:
    label: "Open-Source Repos"
    keywords:
      - "repo"
      - "repository"
      - "GitHub"
      - "open source"
      - "open-source"
      - "library"
      - "tool"
      - "package"
      - "release notes"
      - "changelog"

  industry:
    label: "Industry Moves"
    keywords:
      - "funding"
      - "acquisition"
      - "partnership"
      - "valuation"
      - "raises"
      - "startup"
      - "CEO"
      - "investment"
      - "IPO"
      - "revenue"

  noise:
    label: "Low-Signal / Noise"
    keywords:
      - "celebrity"
      - "opinion"
      - "rumor"
      - "listicle"
      - "horoscope"
      - "clickbait"
      - "sponsored"

# General engineering-value signals (boost engineering_value score regardless of category)
engineering_keywords:
  - "open source"
  - "open-source"
  - "benchmark"
  - "performance"
  - "throughput"
  - "latency"
  - "API"
  - "SDK"
  - "code"
  - "implementation"
  - "weights"
  - "checkpoint"
  - "fine-tune"
  - "training recipe"
  - "evaluation"
  - "reproducible"
  - "tutorial"
  - "how to"
  - "architecture"
  - "optimization"

# Keywords that strongly indicate low engineering value / hype-only content
hype_keywords:
  - "is changing the world"
  - "game changer"
  - "mind-blowing"
  - "you won't believe"
  - "revolutionize"
  - "disrupting"

# Keywords that identify startup funding / investment news (used by the
# "Recent Funding" section to score items from dedicated funding sources).
funding_keywords:
  - "raises"
  - "raised"
  - "funding"
  - "seed round"
  - "seed funding"
  - "series a"
  - "series b"
  - "series c"
  - "series d"
  - "venture capital"
  - "valuation"
  - "acquired"
  - "acquisition"
  - "investment"
  - "backed by"
  - "led by"
  - "round of funding"

# Stack/interest keywords for the curator (humanoid robotics + on-device VLM/VLA perception).
# Items matching these get a relevance bonus and are eligible for the "Matches Your Stack" section.
