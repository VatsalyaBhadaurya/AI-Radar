  - "DINOv3"
  - "DINOv2"
  - "SAM 2"
  - "Segment Anything"
  - "Depth Anything"
  - "DUSt3R"
  - "YOLOv8"
  - "YOLO11"
  - "Whisper"
  - "GPT-OSS"
  - "LLaVA"
  - "behavior tree"
  - "behaviour tree"
  - "affordance"
  - "world model"
  - "sim-to-real"
  - "edge inference"
  - "on-device"
  - "TensorRT"
  - "ONNX"
  - "manipulation"
