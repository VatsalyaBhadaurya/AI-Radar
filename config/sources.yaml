# Source registry for AI Engineering Radar
# type: "rss" (generic RSS/Atom), "arxiv" (arXiv RSS), "github_releases" (repo releases.atom)
# trust: 0.0-1.0, used as source_trust in scoring
# category: maps to taxonomy.yaml categories

sources:
  # ---- Model releases / official labs ----
  - id: openai_news
    name: "OpenAI News"
    type: rss
    url: "https://openai.com/news/rss.xml"
    category: model_releases
    trust: 1.0

  - id: deepmind_blog
    name: "Google DeepMind Blog"
    type: rss
    url: "https://deepmind.google/blog/rss.xml"
    category: model_releases
    trust: 1.0

  - id: huggingface_blog
    name: "Hugging Face Blog"
    type: rss
    url: "https://huggingface.co/blog/feed.xml"
    category: infra_tooling
    trust: 0.9

  - id: pytorch_blog
    name: "PyTorch Blog"
    type: rss
    url: "https://pytorch.org/blog/feed.xml"
    category: infra_tooling
    trust: 0.95

  - id: bair_blog
    name: "Berkeley AI Research (BAIR)"
    type: rss
    url: "https://bair.berkeley.edu/blog/feed.xml"
    category: papers_benchmarks
    trust: 0.9

  - id: nvidia_dev_blog
    name: "NVIDIA Developer Blog (AI)"
    type: rss
    url: "https://developer.nvidia.com/blog/feed/"
    category: infra_tooling
    trust: 0.85

  # ---- arXiv (papers / benchmarks) ----
