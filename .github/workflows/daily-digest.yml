name: Daily Digest

on:
  schedule:
    # 06:00 UTC every day
    - cron: "3 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python run_pipeline.py
        working-directory: scripts
        env:
          # Raises the GitHub Search API rate limit (60 -> 5000 req/hr) for People Radar.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updated digest
        run: |
          git config user.name "ai-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data docs/digest
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update daily digest ($(date -u +%Y-%m-%d))"
            git push
          fi
